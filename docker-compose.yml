services:

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: clouddeploy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_PROFILES_ACTIVE: docker

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres-data: